<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customize a Product</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 960px; margin: 40px auto; padding: 0 16px; }
  h1 { margin-bottom: 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }
  .card {
    display: block;
    text-decoration: none;
    color: inherit;
    border: 1px solid #e2e2e2;
    border-radius: 10px;
    overflow: hidden;
    transition: box-shadow 0.15s ease;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
  .card img {
    width: 100%;
    height: 220px;
    object-fit: contain;
    background: #fafafa;
    display: block;
  }
  .card .placeholder {
    width: 100%;
    height: 220px;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 14px;
  }
  .card .name {
    padding: 12px 14px;
    font-weight: 600;
  }
  .empty {
    color: #777;
    padding: 40px 0;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>Choose a product to customize</h1>

  {% if products %}
  <div class="grid">
    {% for product in products %}
      <a class="card" href="{% url 'product-detail-page' product.slug %}">
        {% if product.primary_image %}
          <img src="{{ product.primary_image.base_image.url }}" alt="{{ product.name }}">
        {% else %}
          <div class="placeholder">No image yet</div>
        {% endif %}
        <div class="name">{{ product.name }}</div>
      </a>
    {% endfor %}
  </div>
  {% else %}
    <p class="empty">No products yet. Run <code>python manage.py seed_demo</code> to load the sample catalog.</p>
  {% endif %}
</body>
</html>
